<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ConsumerBreak — Visual Editor</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    :root{--bg:#060c06;--green:#5fcf6e;--white:#f0f7f0}
    html,body{height:100%;margin:0;background:var(--bg);font-family:Arial,Helvetica,sans-serif}
    #canvas{position:relative;min-height:100vh;opacity:0;transition:opacity .18s linear}
    iframe#site-frame{width:100%;height:100vh;border:0;display:block}

    /* floating modal */
    .cb-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:99998;opacity:0;pointer-events:none;transition:opacity .12s}
    .cb-backdrop.visible{opacity:1;pointer-events:auto}
    .cb-modal{background:#060c06;color:var(--white);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,0.6);max-width:480px;width:92%;padding:18px;border:1px solid rgba(95,207,110,0.14)}
    .cb-modal h3{margin:0 0 8px;color:var(--green)}
    .cb-field{margin-top:10px}
    .cb-field label{display:block;font-size:12px;color:#9fbf9f;margin-bottom:6px}
    .cb-field input,.cb-field textarea{width:100%;padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--white)}
    .cb-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
    .cb-btn{background:var(--green);color:#060c06;padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
    .cb-btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--white)}

    /* overlay button inside iframe will be injected with CSS, but include fallback here */
    .cb-edit-btn{position:absolute;background:var(--green);color:#060c06;padding:6px 8px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;z-index:99997;box-shadow:0 6px 18px rgba(0,0,0,0.4);opacity:0;transition:opacity .12s}
  </style>
</head>
<body>
  <div id="canvas">
    <iframe id="site-frame" src="/index.html"></iframe>
  </div>

  <div id="cb-backdrop" class="cb-backdrop" aria-hidden="true">
    <div class="cb-modal" role="dialog" aria-modal="true">
      <button id="cb-close" style="float:right;background:transparent;border:0;color:var(--white);font-size:18px;cursor:pointer">✕</button>
      <h3 id="cb-title">Edit</h3>
      <div id="cb-form"></div>
      <div class="cb-actions">
        <button id="cb-upload" class="cb-btn ghost">Upload Image</button>
        <button id="cb-save" class="cb-btn">Save</button>
      </div>
    </div>
  </div>

  <script>
    console.log('[Editor] Page loaded');
    const SITE_ID = '30297997-a967-47c3-80cb-678506742164';

    const frame = document.getElementById('site-frame');
    const canvas = document.getElementById('canvas');
    const backdrop = document.getElementById('cb-backdrop');
    const form = document.getElementById('cb-form');
    const titleEl = document.getElementById('cb-title');
    let currentSection = null;
    let identityInitialized = false;

    function showModal(){ backdrop.classList.add('visible'); backdrop.setAttribute('aria-hidden','false'); }
    function hideModal(){ backdrop.classList.remove('visible'); backdrop.setAttribute('aria-hidden','true'); }

    document.getElementById('cb-close').addEventListener('click', hideModal);

    function isAdmin(user){ try { return user && user.app_metadata && user.app_metadata.roles && user.app_metadata.roles.indexOf('admin') !== -1; } catch(e){ return false; } }

    // wait for netlifyIdentity init before touching editor UI
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        identityInitialized = true;
        console.log('[Editor] Identity init complete, user:', user);
        console.log('[Editor] Auth check - user:', user);
        if (user && isAdmin(user)) {
          // inject overlays after iframe content loads
          frame.addEventListener('load', () => setupOverlays(frame));
          // Also set opacity visible only after init to avoid flicker
          canvas.style.opacity = '1';
        } else {
          // no editor chrome — simply show page
          canvas.style.opacity = '1';
        }
      });
      window.netlifyIdentity.init();
    } else {
      // If Identity not present, show site normally
      console.log('[Editor] Identity widget not found');
      canvas.style.opacity = '1';
    }

    // listen for overlay clicks posted from iframe
    window.addEventListener('message', async (ev) => {
      if (!ev.data || ev.data.type !== 'cb-edit') return;
      const section = ev.data.section;
      const file = ev.data.file;
      console.log('[Editor] Edit overlay clicked for section:', section);
      currentSection = { section, file };
      titleEl.textContent = 'Edit — ' + section;
      form.innerHTML = '<div class="cb-field">Loading...</div>';
      showModal();
      // load JSON
      try {
        const r = await fetch(file + '?cb=' + Date.now(), { cache: 'no-store' });
        const data = await r.json();
        buildFormFor(section, file, data);
      } catch(e){
        form.innerHTML = '<div class="cb-field">Failed to load data</div>';
      }
    });

    function buildFormFor(section, dataFile, data){
      console.log('[Editor] Building form for', section, dataFile, data);
      form.innerHTML = '';
      function addField(key, label, type='text', val=''){
        const wrap = document.createElement('div'); wrap.className='cb-field';
        const lab = document.createElement('label'); lab.textContent = label; wrap.appendChild(lab);
        let input;
        if (type === 'textarea') { input = document.createElement('textarea'); input.rows=4; }
        else { input = document.createElement('input'); input.type='text'; }
        input.id = 'cb-' + key; input.value = (val===undefined? '': val);
        wrap.appendChild(input);
        form.appendChild(wrap);
      }

      // map fields per section
      const mapping = {
        'Hero': ['badge','tagline','nav_logo','hero_logo','hero_image'],
        'PitchBreak': ['time','description','image'],
        'Spectral Sessions': ['time','description','image'],
        'Hybrid Creatures': ['description','movie_url','image'],
        'NFTOPIA': ['description','image'],
        'Breakery': ['tagline'],
        'Community': ['title','description']
      };

      const fields = mapping[section] || Object.keys(data);
      fields.forEach(f => {
        const label = f.replace(/_/g,' ').replace(/\b\w/g, l => l.toUpperCase());
        const val = data[f];
        const type = (f==='description' || f==='tagline' || f==='title') ? 'textarea' : 'text';
        addField(f, label, type, val || '');
      });

      // Upload image button behavior: prompt for URL and set any field named image, nav_logo, hero_logo, hero_image
      document.getElementById('cb-upload').onclick = () => {
        const url = prompt('Paste image URL:');
        if (!url) return;
        // find first image-like field in form
        const candidates = ['image','nav_logo','hero_logo','hero_image'];
        for (const c of candidates){ const el = document.getElementById('cb-'+c); if (el){ el.value = url; break; } }
      };

      document.getElementById('cb-save').onclick = async () => {
        const dataOut = {};
        fields.forEach(f => { const el = document.getElementById('cb-'+f); if (el) dataOut[f] = el.value; });
        console.log('[Editor] Saving to:', dataFile, dataOut);
        try{
          const token = await window.netlifyIdentity.currentUser().jwt();
          const filePath = dataFile.replace(/^\//,'');
          const putUrl = 'https://api.netlify.com/api/v1/sites/' + encodeURIComponent(SITE_ID) + '/files/' + encodeURIComponent(filePath);
          const body = { content: JSON.stringify(dataOut, null, 2) };
          const r = await fetch(putUrl, { method:'PUT', headers:{ 'Authorization':'Bearer '+token, 'Content-Type':'application/json' }, body: JSON.stringify(body) });
          if (!r.ok) throw new Error('Save failed: ' + r.status + ' ' + await r.text());
          console.log('[Editor] Save complete');
          hideModal();
          // reload iframe to reflect changes
          frame.src = frame.src.split('#')[0] + '#cb' + Date.now();
        }catch(e){
          alert('Save failed: ' + e.message);
          console.error(e);
        }
      };
    }

    // inject overlay buttons into iframe
    function setupOverlays(iframe){
      try{
        const idoc = iframe.contentDocument || iframe.contentWindow.document;
        console.log('[Editor] Injecting edit overlays');
        // ensure we don't run twice
        if (idoc.getElementById('cb-overlay-styles')) return;

        // add CSS inside iframe for overlay button
        const style = idoc.createElement('style'); style.id = 'cb-overlay-styles';
        style.textContent = `
          .cb-edit-btn{position:absolute;background:#5fcf6e;color:#060c06;padding:6px 8px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;z-index:9999;box-shadow:0 6px 18px rgba(0,0,0,0.4);opacity:0;transition:opacity .12s}
          .cb-target{position:relative}
          .cb-target:hover > .cb-edit-btn{opacity:1}
        `;
        idoc.head.appendChild(style);

        // mapping of sections -> selector -> friendly name -> data file
        const targets = [
          { sel: 'section.hero', name: 'Hero', file: '/_data/hero.json' },
          { sel: '#shows .show-card.pb', name: 'PitchBreak', file: '/_data/pitchbreak.json' },
          { sel: '#shows .show-card.ss', name: 'Spectral Sessions', file: '/_data/spectral.json' },
          { sel: '#hybrid', name: 'Hybrid Creatures', file: '/_data/hybrid.json' },
          { sel: '#nfts', name: 'NFTOPIA', file: '/_data/nftopia.json' },
          { sel: '#breakery', name: 'Breakery', file: '/_data/breakery.json' },
          { sel: '#community', name: 'Community', file: '/_data/community.json' }
        ];

        targets.forEach(t => {
          const els = idoc.querySelectorAll(t.sel);
          els.forEach(el => {
            // mark target
            if (!el.classList.contains('cb-target')) el.classList.add('cb-target');
            // create button
            const btn = idoc.createElement('button');
            btn.className = 'cb-edit-btn';
            btn.textContent = '✏ Edit';
            btn.style.top = '12px'; btn.style.right = '12px';
            btn.addEventListener('click', (ev) => {
              ev.stopPropagation(); ev.preventDefault();
              // post to parent
              window.parent.postMessage({ type: 'cb-edit', section: t.name, file: t.file }, '*');
              console.log('[Editor] Edit overlay clicked for section:', t.name);
            });
            el.appendChild(btn);
          });
        });
      }catch(e){ console.error('Overlay injection failed', e); }
    }

  </script>
</body>
</html>
