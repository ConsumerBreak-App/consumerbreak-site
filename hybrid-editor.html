<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybrid Creatures Editor — ConsumerBreak</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{background:#060c06;color:#f0f7f0;font-family:'Barlow',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;opacity:0;transition:opacity .2s;}
.wrap{text-align:center;max-width:480px;padding:40px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:48px;color:#5fcf6e;letter-spacing:3px;margin-bottom:16px;}
p{color:rgba(240,247,240,0.5);font-size:14px;line-height:1.7;margin-bottom:28px;}
.btn{display:inline-block;background:#5fcf6e;color:#060c06;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:12px 24px;border-radius:3px;text-decoration:none;margin:6px;}
.btn-out{background:transparent;border:2px solid rgba(240,247,240,0.2);color:#f0f7f0;}
</style>
</head>
<body>
<div class="wrap">
  <h1>HYBRID CREATURES EDITOR</h1>
  <p>Edit Hybrid Creatures stats, description, movie URL, and images using the Homepage Editor — the full Hybrid Creatures section is editable there.</p>
  <a href="/editor.html" class="btn">Open Homepage Editor</a><br>
  <a href="/hybrid-creatures.html" class="btn btn-out">← Back to Hybrid Creatures</a>
  <a href="/admin" class="btn btn-out">Decap CMS</a>
</div>
<script>
window.netlifyIdentity.on('init', function(user) {
  if (!user) { window.location.replace('/index.html'); return; }
  document.body.style.opacity = '1';
});
window.netlifyIdentity.init();
</script>
</body>
</html>
