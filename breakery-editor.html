<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakery Editor — ConsumerBreak</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b110b;color:#c8e6c8;font-family:'Barlow',sans-serif;opacity:0;transition:opacity .12s;overflow-x:hidden;}
a{text-decoration:none;}
.editor-banner{background:#1a3a1a;border-bottom:2px solid #5fcf6e;padding:10px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.editor-banner-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#5fcf6e;}
.editor-banner-btns a{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;border-radius:3px;color:#0b110b;background:#5fcf6e;text-decoration:none;margin-left:8px;}
.editor-banner-btns a.out{background:transparent;color:#5fcf6e;border:1px solid #5fcf6e;}
nav{background:#0b110b;border-bottom:1px solid #1c361c;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;z-index:10;}
.nav-logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#5fcf6e;letter-spacing:3px;}
.nlinks{display:flex;gap:24px;align-items:center;}
.nlinks a{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#8ab88a;}
.nlinks a:hover{color:#5fcf6e;}
.ncta{background:#5fcf6e;color:#0b110b !important;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:8px 18px;border-radius:3px;}
.breakery-hero{background:#0b110b;padding:60px 40px;border-bottom:2px solid #3a7a3a;text-align:center;position:relative;}
.breakery-hero-img-wrap{margin:0 auto 24px;max-width:640px;min-height:80px;display:flex;align-items:center;justify-content:center;}
.breakery-hero-img-wrap img{max-width:100%;max-height:200px;object-fit:contain;mix-blend-mode:screen;}
.breakery-hero-fallback{font-family:'Bebas Neue',sans-serif;font-size:90px;letter-spacing:6px;color:#f0f7ee;line-height:1;}
.breakery-hero-fallback span{color:#5fcf6e;}
.breakery-hero-sub{font-size:17px;color:#c8e6c8;line-height:1.7;max-width:600px;margin:16px auto 0;}
.account-bar{background:#0f1a0f;border-bottom:1px solid #1c361c;padding:14px 40px;display:flex;align-items:center;justify-content:space-between;}
.account-bar-left{font-size:15px;color:#c8e6c8;}
.account-bar-left strong{color:#f0f7ee;}
/* APP MANAGE AREA */
.apps-manage{padding:40px;}
.apps-manage-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.apps-manage-hdr h2{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;color:#f0f7ee;}
.add-app-btn{background:#5fcf6e;color:#0b110b;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;}
.app-row{background:#0d160d;border:1px solid #1c361c;border-radius:8px;padding:16px 20px;margin-bottom:12px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;}
.app-row-order{display:flex;flex-direction:column;gap:4px;}
.order-btn{background:#1a3a1a;border:1px solid #2a5a2a;color:#5fcf6e;font-size:14px;width:28px;height:28px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.order-btn:hover{background:#2a5a2a;}
.app-row-icon{width:48px;height:48px;border-radius:10px;background:#1a3a1a;border:1px solid #2a5a2a;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.app-row-icon img{width:100%;height:100%;object-fit:cover;}
.app-row-info{}
.app-row-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:#f0f7ee;letter-spacing:1px;}
.app-row-desc{font-size:14px;color:#c8e6c8;margin-top:2px;}
.app-row-meta{font-size:13px;color:#5fcf6e;margin-top:4px;}
.app-row-actions{display:flex;gap:8px;flex-shrink:0;}
.edit-btn{background:transparent;border:1px solid #5fcf6e;color:#5fcf6e;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;border-radius:4px;cursor:pointer;}
.edit-btn:hover{background:#1a3a1a;}
/* EDITABLE OVERLAYS FOR HERO */
.editable-hero{position:relative;}
.editable-hero:hover .hero-edit-btn{opacity:1;}
.hero-edit-btn{position:absolute;top:12px;right:12px;background:#5fcf6e;color:#0b110b;border:none;border-radius:4px;padding:6px 14px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;opacity:0;transition:opacity .15s;z-index:10;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:flex-start;justify-content:center;z-index:99999;overflow-y:auto;padding:5vh 0;}
.modal{background:#0a110a;border:1px solid #5fcf6e;border-radius:8px;padding:24px;max-width:540px;width:95%;max-height:85vh;overflow-y:auto;position:relative;}
.modal h2{font-family:'Bebas Neue',sans-serif;color:#5fcf6e;font-size:28px;letter-spacing:2px;margin-bottom:16px;}
.modal label{display:block;color:#9fbf9f;font-size:13px;margin-bottom:4px;margin-top:12px;}
.modal input,.modal textarea{width:100%;padding:9px;background:rgba(255,255,255,.05);border:1px solid #1a2e1a;border-radius:4px;color:#f0f7f0;font-size:14px;font-family:'Barlow',sans-serif;}
.modal textarea{resize:vertical;}
.modal-actions{display:flex;justify-content:space-between;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid #1a2e1a;}
.modal-right{display:flex;gap:8px;}
.btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.1);color:#f0f7f0;padding:9px 18px;border-radius:6px;cursor:pointer;font-size:14px;}
.btn-save{background:#5fcf6e;border:none;color:#0b110b;padding:9px 18px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700;}
.btn-delete{background:#3a0a0a;border:1px solid #6a2a2a;color:#f07a7a;padding:9px 18px;border-radius:6px;cursor:pointer;font-size:14px;}
.close-x{position:absolute;right:12px;top:12px;background:transparent;border:none;color:#f0f7f0;font-size:18px;cursor:pointer;}
.upload-wrap{margin-top:6px;}
.upload-btn{background:transparent;border:1px solid #5fcf6e;color:#5fcf6e;padding:5px 12px;border-radius:4px;font-size:13px;cursor:pointer;}
.img-preview{display:block;max-width:100%;max-height:100px;margin-top:8px;border-radius:4px;border:1px solid #1a2e1a;}
</style>
</head>
<body>

<div class="editor-banner">
  <span class="editor-banner-text">✏ Breakery Editor Mode</span>
  <div class="editor-banner-btns">
    <a href="/editor.html">Homepage Editor</a>
    <a href="/breakery.html" class="out">View Public Page →</a>
  </div>
</div>

<nav>
  <span class="nav-logo-text">CON$UMER BREAK</span>
  <div class="nlinks">
    <a href="index.html">Home</a>
    <a href="breakery.html" style="color:#5fcf6e;">Breakery</a>
    <a href="community.html">Community</a>
    <a class="ncta" href="https://twitch.tv/consumerbreak" target="_blank">Watch Live</a>
  </div>
</nav>

<!-- HERO -->
<div class="breakery-hero editable-hero">
  <button class="hero-edit-btn" onclick="openModal('hero')">✏ Edit Hero</button>
  <div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#5fcf6e;margin-bottom:8px;">App Suite</div>
    <div class="breakery-hero-img-wrap">
      <img id="d-hero-img" src="" alt="The Breakery" style="display:none;">
      <div class="breakery-hero-fallback" id="d-hero-fallback">THE <span>BREAKERY</span></div>
    </div>
    <p class="breakery-hero-sub" id="d-tagline">30 apps. One Breakverse account.</p>
  </div>
</div>

<div class="account-bar">
  <div class="account-bar-left">One <strong>Breakverse account</strong> works across all apps — your stats, XP, and leaderboard rank carry everywhere.</div>
</div>

<!-- APP LIST MANAGER -->
<div class="apps-manage">
  <div class="apps-manage-hdr">
    <h2>App Cards</h2>
    <button class="add-app-btn" onclick="openModal('add-app')">+ Add New App</button>
  </div>
  <div id="app-list"><!-- populated by renderApps() --></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<script>
let bData = {};

function esc(s) { return (s||'').replace(/"/g,'&quot;'); }
function val(id) { const el = document.getElementById(id); return el ? el.value : ''; }
function fixSrc(s) { if (!s) return ''; if (s.startsWith('http')||s.startsWith('data:')) return s; return s.startsWith('/') ? s : '/'+s; }
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

async function loadData() {
  try {
    const r = await fetch('/_data/breakery.json?cb=' + Date.now(), { cache:'no-store' });
    const t = await r.text();
    try { bData = JSON.parse(t); } catch(e) { return; }
    renderAll();
  } catch(e) {}
}

function renderAll() {
  // Hero
  if (bData.hero_image) {
    const img = document.getElementById('d-hero-img'); const fb = document.getElementById('d-hero-fallback');
    if (img) { img.src = fixSrc(bData.hero_image); img.style.display = 'block'; }
    if (fb) fb.style.display = 'none';
  }
  if (bData.tagline) document.getElementById('d-tagline').textContent = bData.tagline;
  renderApps();
}

function renderApps() {
  const list = document.getElementById('app-list');
  const apps = bData.apps || [];
  list.innerHTML = apps.map((a, i) => {
    const iconHtml = a.icon ? '<img src="' + fixSrc(a.icon) + '" alt="">' : '🎮';
    return `<div class="app-row">
      <div class="app-row-order">
        ${i > 0 ? '<button class="order-btn" onclick="moveApp(' + i + ',-1)" title="Move up">↑</button>' : '<div style="width:28px;height:28px;"></div>'}
        ${i < apps.length-1 ? '<button class="order-btn" onclick="moveApp(' + i + ',1)" title="Move down">↓</button>' : '<div style="width:28px;height:28px;"></div>'}
      </div>
      <div style="display:flex;gap:14px;align-items:center;">
        <div class="app-row-icon">${iconHtml}</div>
        <div class="app-row-info">
          <div class="app-row-name">${a.name||'Unnamed'}</div>
          <div class="app-row-desc">${(a.description||a.desc||'').substring(0,80)}${(a.description||a.desc||'').length>80?'...':''}</div>
          <div class="app-row-meta">${a.status||''} ${a.link ? '· <a href="'+a.link+'" target="_blank" style="color:#5fcf6e;">'+a.link+'</a>' : ''}</div>
        </div>
      </div>
      <div class="app-row-actions">
        <button class="edit-btn" onclick="openModal('app-${i}')">✏ Edit</button>
      </div>
    </div>`;
  }).join('');
}

async function moveApp(idx, dir) {
  const apps = [...(bData.apps || [])];
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= apps.length) return;
  [apps[idx], apps[newIdx]] = [apps[newIdx], apps[idx]];
  const out = Object.assign({}, bData, { apps });
  await saveData(out);
}

async function saveData(out) {
  try {
    const user = window.netlifyIdentity.currentUser();
    const token = await user.jwt();
    const gr = await fetch('/.netlify/git/github/contents/_data/breakery.json', { headers: { 'Authorization': 'Bearer ' + token } });
    const gj = await gr.json();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(out, null, 2))));
    const pr = await fetch('/.netlify/git/github/contents/_data/breakery.json', {
      method:'PUT', headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body: JSON.stringify({ message:'Edit Breakery via editor', content, sha: gj.sha })
    });
    if (!pr.ok) throw new Error('Save failed: ' + pr.status);
    bData = out; renderAll(); closeModal();
    alert('✓ Saved! Deploying in ~30 seconds.');
  } catch(e) { alert('Save error: ' + e.message); }
}

async function uploadFile(file, targetId, btnEl) {
  const user = window.netlifyIdentity.currentUser();
  const token = await user.jwt();
  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const filename = 'images/uploads/' + Date.now() + '_' + safeName;
  const ab = await file.arrayBuffer(); const bytes = new Uint8Array(ab);
  let bin = ''; for (let i=0;i<bytes.byteLength;i+=8192) bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+8192));
  const content = btoa(bin);
  let sha; try { const c=await fetch('/.netlify/git/github/contents/'+filename,{headers:{'Authorization':'Bearer '+token}});if(c.ok)sha=(await c.json()).sha;}catch(e){}
  const body={message:'Upload image: '+safeName,content};if(sha)body.sha=sha;
  const up=await fetch('/.netlify/git/github/contents/'+filename,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!up.ok) throw new Error('Upload failed: '+up.status);
  const path = '/'+filename;
  document.getElementById(targetId).value = path;
  btnEl.textContent = '✓ Uploaded';
  // show preview
  let prev = document.getElementById(targetId+'_prev');
  if (!prev) { prev = document.createElement('img'); prev.id = targetId+'_prev'; prev.className='img-preview'; document.getElementById(targetId).parentNode.appendChild(prev); }
  prev.src = path+'?cb='+Date.now();
}

function makeImageRow(labelText, fieldId, currentVal) {
  const wrap = document.createElement('div');
  wrap.innerHTML = '<label>' + labelText + '</label><input id="' + fieldId + '" type="text" placeholder="Image path or URL" value="' + esc(currentVal) + '">';
  const uploadWrap = document.createElement('div'); uploadWrap.className = 'upload-wrap';
  const fileInput = document.createElement('input'); fileInput.type='file'; fileInput.accept='image/*,.gif'; fileInput.style.display='none';
  const upBtn = document.createElement('button'); upBtn.className='upload-btn'; upBtn.textContent='📁 Upload from computer';
  upBtn.onclick = e => { e.preventDefault(); fileInput.click(); };
  fileInput.onchange = async () => {
    const file = fileInput.files[0]; if (!file) return;
    upBtn.textContent='⏳ Uploading...'; upBtn.disabled=true;
    try { await uploadFile(file, fieldId, upBtn); } catch(e) { alert('Upload error: '+e.message); upBtn.textContent='📁 Upload from computer'; upBtn.disabled=false; }
  };
  uploadWrap.appendChild(upBtn); uploadWrap.appendChild(fileInput);
  if (currentVal) { const p=document.createElement('img'); p.id=fieldId+'_prev'; p.className='img-preview'; p.src=fixSrc(currentVal); uploadWrap.appendChild(p); }
  wrap.appendChild(uploadWrap);
  return wrap;
}

function openModal(type) {
  const modal = document.getElementById('modal-content');
  const overlay = document.getElementById('modal-overlay');
  modal.innerHTML = '';
  const cx = document.createElement('button'); cx.className='close-x'; cx.textContent='✕'; cx.onclick=closeModal; modal.appendChild(cx);

  if (type === 'hero') {
    modal.innerHTML += '<h2>Breakery Hero</h2>';
    modal.innerHTML += '<label>Tagline</label><textarea id="f-tagline" style="min-height:80px;">' + (bData.tagline||'') + '</textarea>';
    modal.appendChild(makeImageRow('Hero Image / GIF (replaces THE BREAKERY text)', 'f-hero-img', bData.hero_image||''));
    addModalActions(() => saveData(Object.assign({}, bData, { tagline: val('f-tagline'), hero_image: val('f-hero-img') })));

  } else if (type === 'add-app' || type.startsWith('app-')) {
    const isEdit = type.startsWith('app-');
    const idx = isEdit ? parseInt(type.split('-')[1]) : -1;
    const app = isEdit ? (bData.apps||[])[idx]||{} : {};
    modal.innerHTML += '<h2>' + (isEdit ? 'Edit App' : 'Add New App') + '</h2>';
    modal.innerHTML += '<label>Name</label><input id="f-name" value="' + esc(app.name) + '">';
    modal.innerHTML += '<label>Description</label><textarea id="f-desc" style="min-height:80px;">' + (app.description||app.desc||'') + '</textarea>';
    modal.innerHTML += '<label>Status (Live / Beta / Coming Soon)</label><input id="f-status" value="' + esc(app.status) + '">';
    modal.innerHTML += '<label>Link URL</label><input id="f-link" value="' + esc(app.link) + '">';
    modal.appendChild(makeImageRow('Icon Image', 'f-icon', app.icon||''));

    const getAppData = () => ({ name: val('f-name'), desc: val('f-desc'), description: val('f-desc'), status: val('f-status'), link: val('f-link'), icon: val('f-icon') });

    if (isEdit) {
      const actions = document.createElement('div'); actions.className = 'modal-actions';
      const delBtn = document.createElement('button'); delBtn.className = 'btn-delete'; delBtn.textContent = 'Delete App';
      delBtn.onclick = () => { if (!confirm('Delete this app?')) return; const apps = (bData.apps||[]).filter((_,i)=>i!==idx); saveData(Object.assign({},bData,{apps})); };
      const right = document.createElement('div'); right.className='modal-right';
      const cancel = document.createElement('button'); cancel.className='btn-cancel'; cancel.textContent='Cancel'; cancel.onclick=closeModal;
      const saveBtn = document.createElement('button'); saveBtn.className='btn-save'; saveBtn.textContent='Save';
      saveBtn.onclick = () => { const apps=[...(bData.apps||[])]; apps[idx]=getAppData(); saveData(Object.assign({},bData,{apps})); };
      right.appendChild(cancel); right.appendChild(saveBtn); actions.appendChild(delBtn); actions.appendChild(right); modal.appendChild(actions);
    } else {
      addModalActions(() => { const apps=[...(bData.apps||[]),getAppData()]; return saveData(Object.assign({},bData,{apps})); });
    }
  }

  overlay.style.display = 'flex';
}

function addModalActions(saveFn) {
  const modal = document.getElementById('modal-content');
  const actions = document.createElement('div'); actions.className='modal-actions';
  const right = document.createElement('div'); right.className='modal-right';
  const cancel = document.createElement('button'); cancel.className='btn-cancel'; cancel.textContent='Cancel'; cancel.onclick=closeModal;
  const saveBtn = document.createElement('button'); saveBtn.className='btn-save'; saveBtn.textContent='Save';
  saveBtn.onclick = async () => { try { await saveFn(); } catch(e) { alert('Error: '+e.message); } };
  right.appendChild(cancel); right.appendChild(saveBtn);
  actions.appendChild(document.createElement('span')); actions.appendChild(right);
  modal.appendChild(actions);
}

window.netlifyIdentity.on('init', user => {
  if (!user) { window.location.replace('/index.html'); return; }
  document.body.style.opacity = '1';
  loadData();
});
window.netlifyIdentity.init();
</script>
</body>
</html>
