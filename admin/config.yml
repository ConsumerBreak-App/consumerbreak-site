backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://consumerbreak.natanel.workers.dev

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "_data/hero.json"
        fields:
          - {label: "Live Badge Text", name: "badge", widget: "string"}
          - {label: "Tagline", name: "tagline", widget: "string"}
          - {label: "Hero Image (jpg, png, gif)", name: "hero_image", widget: "image", required: false}
      - name: "pitchbreak"
        label: "PitchBreak Show"
        file: "_data/pitchbreak.json"
        fields:
          - {label: "Time", name: "time", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Show Image (jpg, png, gif)", name: "image", widget: "image", required: false}
      - name: "spectral"
        label: "Spectral Sessions Show"
        file: "_data/spectral.json"
        fields:
          - {label: "Time", name: "time", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Show Image (jpg, png, gif)", name: "image", widget: "image", required: false}
      - name: "hybrid"
        label: "Hybrid Creatures"
        file: "_data/hybrid.json"
        fields:
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Image (jpg, png, gif)", name: "image", widget: "image", required: false}
      - name: "nftopia"
        label: "NFTOPIA"
        file: "_data/nftopia.json"
        fields:
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Image (jpg, png, gif)", name: "image", widget: "image", required: false}
      - name: "breakery"
        label: "The Breakery"
        file: "_data/breakery.json"
        fields:
          - {label: "Tagline", name: "tagline", widget: "string"}
          - name: "apps"
            label: "Apps"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Status", name: "status", widget: "select", options: ["Live", "Beta", "Era 2 Beta", "Coming Soon"]}
              - {label: "App Image (gif supported)", name: "image", widget: "image", required: false}
      - name: "community"
        label: "Community / Breakverse"
        file: "_data/community.json"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - name: "earn_items"
            label: "Earn Items"
            widget: "list"
            field: {label: "Item", name: "item", widget: "string"}
