backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"
media_library:
  name: uploadcare
  config:
    publicKey: demopublickey

publish_mode: editorial_workflow

site_url: https://consumerbreak-website-2026.netlify.app

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "_data/hero.json"
        fields:
          - {label: "Live Badge Text", name: "badge", widget: "string", default: "Live Every Wednesday & Sunday"}
          - {label: "Tagline", name: "tagline", widget: "string"}
          - label: "Hero Image (jpg, png, gif supported)"
            name: "hero_image"
            widget: "image"
            required: false
            media_library:
              config:
                multiple: false

      - name: "pitchbreak"
        label: "PitchBreak Show"
        file: "_data/pitchbreak.json"
        fields:
          - {label: "Day", name: "day", widget: "string", default: "Wednesdays"}
          - {label: "Time", name: "time", widget: "string", default: "2:00 PM EST · 7:00 PM UTC"}
          - {label: "Description", name: "description", widget: "text"}
          - label: "Show Image (jpg, png, gif supported)"
            name: "image"
            widget: "image"
            required: false

      - name: "spectral"
        label: "Spectral Sessions Show"
        file: "_data/spectral.json"
        fields:
          - {label: "Day", name: "day", widget: "string", default: "Sundays"}
          - {label: "Time", name: "time", widget: "string", default: "2:00 PM EST · 7:00 PM UTC"}
          - {label: "Description", name: "description", widget: "text"}
          - label: "Show Image (jpg, png, gif supported)"
            name: "image"
            widget: "image"
            required: false

      - name: "hybrid"
        label: "Hybrid Creatures Section"
        file: "_data/hybrid.json"
        fields:
          - {label: "Description", name: "description", widget: "text"}
          - label: "NFT Card Art (gif supported for animated cards)"
            name: "image"
            widget: "image"
            required: false

      - name: "nftopia"
        label: "NFTOPIA Section"
        file: "_data/nftopia.json"
        fields:
          - {label: "Description", name: "description", widget: "text"}
          - label: "Event Image (jpg, png, gif supported)"
            name: "image"
            widget: "image"
            required: false

      - name: "breakery"
        label: "The Breakery Section"
        file: "_data/breakery.json"
        fields:
          - {label: "Tagline", name: "tagline", widget: "string"}
          - name: "apps"
            label: "Apps"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Status", name: "status", widget: "select", options: ["Live", "Beta", "Era 2 Beta", "Coming Soon"]}
              - label: "App Screenshot (gif supported)"
                name: "image"
                widget: "image"
                required: false

      - name: "community"
        label: "Community / Breakverse"
        file: "_data/community.json"
        fields:
          - {label: "Title", name: "title", widget: "string", default: "Join The Breakverse"}
          - {label: "Description", name: "description", widget: "text"}
          - name: "earn_items"
            label: "Earn Items"
            widget: "list"
            field: {label: "Item", name: "item", widget: "string"}
